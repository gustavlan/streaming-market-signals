name: Daily Data Pipeline

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      DATA_DIR: data
      DUCKDB_PATH: data/music_warehouse.duckdb
      KWORB_PARQUET_GLOB: data/raw/kworb/*.parquet
      MUSICBRAINZ_RAW_DIR: data/raw/musicbrainz
      DBT_PROFILES_DIR: dbt_project
      DBT_TARGET: ci
      SPOTIPY_CLIENT_ID: ${{ secrets.SPOTIPY_CLIENT_ID }}
      SPOTIPY_CLIENT_SECRET: ${{ secrets.SPOTIPY_CLIENT_SECRET }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install uv
        uses: astral-sh/setup-uv@v4

      - name: Install Python dependencies
        run: uv pip install -e ".[dev]" --system

      - name: Install Playwright browsers
        run: playwright install --with-deps chromium

      - name: Download MusicBrainz reference data
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release download data-v1 --dir data/raw/musicbrainz/

      - name: Run pipeline
        run: bash scripts/run_pipeline.sh

      - name: Commit and push data updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/raw/kworb/ notebooks/
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: daily data update $(date -u +%Y-%m-%d)"
            git push
          fi
