name: Daily Data Pipeline

on:
  schedule:
    - cron: '0 9 * * *'
  workflow_dispatch:

jobs:
  pipeline:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    env:
      DATA_DIR: data
      DUCKDB_PATH: data/music_warehouse.duckdb
      KWORB_PARQUET_GLOB: data/raw/kworb/*.parquet
      MUSICBRAINZ_RAW_DIR: data/raw/musicbrainz
      DBT_PROFILES_DIR: dbt_project
      DBT_TARGET: ci
      SPOTIPY_CLIENT_ID: ${{ secrets.SPOTIPY_CLIENT_ID }}
      SPOTIPY_CLIENT_SECRET: ${{ secrets.SPOTIPY_CLIENT_SECRET }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install Python dependencies
        run: pip install -e ".[dev]"

      - name: Install Playwright browsers
        run: playwright install --with-deps chromium

      - name: Download MusicBrainz reference data
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: gh release download data-v1 --dir data/raw/musicbrainz/

      - name: Run pipeline
        run: bash scripts/run_pipeline.sh

      - name: Commit and push data updates
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git diff --quiet || (git add data/ notebooks/ && git commit -m "chore: daily data update" && git push)
